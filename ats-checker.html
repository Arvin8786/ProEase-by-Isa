<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feature Loading | ProEase V3.2</title>
    
    <!-- External Fonts & Global Styles -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Specific Styles for the Development Placeholder */
        .dev-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 80vh;
            text-align: center;
            padding: 20px;
        }

        .dev-icon-circle {
            font-size: 64px;
            margin-bottom: 25px;
            background: #e0e7ff;
            width: 140px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: #6366f1;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.2);
            animation: pulse 2s infinite;
        }

        .status-badge {
            background: #fef3c7;
            color: #92400e;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            border: 1px solid #fde68a;
        }

        h1 { 
            font-size: 36px; 
            font-weight: 800; 
            margin: 10px 0; 
            color: #0f172a; 
            letter-spacing: -1px;
        }

        .dev-description { 
            color: #64748b; 
            max-width: 500px; 
            line-height: 1.8; 
            font-size: 16px;
            margin-bottom: 40px;
        }

        .return-btn {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 14px 30px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            color: #1e293b;
            text-decoration: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .return-btn:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- The main content area where the feature will eventually live -->
    <div class="main">
        <div class="dev-wrapper">
            <div class="status-badge">Module in Progress</div>
            <div class="dev-icon-circle">⚙️</div>
            
            <h1 id="featureHeading">Initializing Feature...</h1>
            
            <p class="dev-description">
                Our AI engineering team is currently fine-tuning the models and data structures for this module. 
                This advanced tool will be available in the next ProEase system update.
            </p>
            
            <a href="dashboard.html" class="return-btn">
                <span>←</span> Back to System Overview
            </a>
        </div>
    </div>

    <!-- SCRIPT LOADING SEQUENCE (VERY IMPORTANT) -->

    <!-- 1. Load Master Config first (Defines URL and App Info) -->
    <script src="config.js"></script>

    <!-- 2. Load Sidebar second (Uses variables from config.js) -->
    <script src="sidebar.js"></script>
    
    <!-- 3. Page-Specific Logic -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Get current filename (e.g., ats-checker.html)
            const path = window.location.pathname.split("/").pop();
            const fileName = path.replace(".html", "");
            
            // Format name: 'ats-checker' becomes 'ATS Checker'
            const formattedName = fileName
                .split("-")
                .map(word => {
                    if (word.length <= 3) return word.toUpperCase(); // Handles ATS, AI, etc.
                    return word.charAt(0).toUpperCase() + word.slice(1);
                })
                .join(" ");

            // Update Page Content
            document.getElementById('featureHeading').innerText = formattedName + " is Coming Soon";
            
            // Update Browser Tab Title
            document.title = `${APP_CONFIG.name} | ${formattedName}`;

            console.log("System Ready. Module: " + formattedName);
            console.log("Global API URL: " + APPS_SCRIPT_URL);
        });
    </script>
</body>
</html>
