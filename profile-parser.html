<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Master Profile | ProEase</title>
    <link rel="stylesheet" href="style.css">
    <!-- AI Photo Lib -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix"></script>
    <style>
        .section-card { background:white; padding:30px; border-radius:15px; margin-bottom:20px; border:1px solid #e2e8f0; }
        .row { display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:15px; }
        #sig-canvas { border:1px solid #ddd; background:white; width:100%; height:150px; cursor:crosshair; }
        #photo-preview { width:100px; height:100px; border-radius:50%; object-fit:cover; border:2px solid #6366f1; }
        .repeater { border-left:3px solid #6366f1; padding-left:15px; margin-bottom:20px; position:relative; }
        .ai-btn { background:#eef2ff; color:#4338ca; border:none; padding:5px 10px; border-radius:5px; cursor:pointer; font-size:11px; font-weight:bold; }
    </style>
</head>
<body>
    <div class="main">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h1>Master Career Profile</h1>
            <button class="action-btn" onclick="saveToDrive()" id="saveBtn">Save to My Drive</button>
        </header>

        <div class="privacy-shield">
            <strong>🔒 Zero-Knowledge Privacy Architecture</strong>
            Your data is stored exclusively within your own Google Drive. ProEase developers cannot access your personal information.
        </div>

        <!-- PHOTO & SIGNATURE -->
        <div class="section-card">
            <div class="row">
                <div>
                    <label>Professional Headshot</label><br>
                    <img id="photo-preview" src="https://via.placeholder.com/100">
                    <input type="file" id="photo-input" onchange="previewPhoto(event)" style="font-size:10px;">
                    <button class="ai-btn" id="rb-btn" style="display:none;" onclick="removeBG()">🪄 AI Remove BG</button>
                </div>
                <div>
                    <label>Digital Signature</label>
                    <canvas id="sig-canvas"></canvas>
                    <button class="btn-small" onclick="clearSig()">Clear</button>
                </div>
            </div>
        </div>

        <!-- PERSONAL -->
        <div class="section-card">
            <h3>Personal Details</h3>
            <div class="row">
                <input type="text" id="p-name" placeholder="Full Name">
                <input type="text" id="p-title" placeholder="Target Job Title">
            </div>
            <textarea id="p-summary" rows="3" placeholder="Summary..."></textarea>
            <button class="ai-btn" onclick="runAI('summary')">🪄 AI Write Summary</button>
        </div>

        <!-- EXPERIENCE -->
        <div class="section-card">
            <h3>Experience <button onclick="addExp()" class="btn-small">+ Add</button></h3>
            <div id="exp-list"></div>
        </div>

        <!-- EDUCATION / SKILLS / LANG / REF (Add similar repeaters) -->
         <div class="section-card">
            <h3>Education & Skills</h3>
            <textarea id="p-skills" placeholder="Skills (Comma separated)"></textarea>
        </div>

    </div>

    <script src="sidebar.js"></script>
    <script>
        const driveToken = localStorage.getItem('drive_token');
        const APPS_SCRIPT_URL = "PASTE_YOUR_APPS_SCRIPT_URL_HERE";
        let fileId = null;

        // --- SIGNATURE LOGIC ---
        const canvas = document.getElementById('sig-canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        canvas.addEventListener('mousedown', () => drawing = true);
        canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
        canvas.addEventListener('mousemove', (e) => {
            if(!drawing) return;
            const rect = canvas.getBoundingClientRect();
            ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
            ctx.stroke();
        });
        function clearSig() { ctx.clearRect(0,0,canvas.width,canvas.height); }

        // --- AI PHOTO LOGIC ---
        function previewPhoto(e) {
            const reader = new FileReader();
            reader.onload = (f) => { 
                document.getElementById('photo-preview').src = f.target.result; 
                document.getElementById('rb-btn').style.display = 'block';
            };
            reader.readAsDataURL(e.target.files[0]);
        }
        async function removeBG() {
            const btn = document.getElementById('rb-btn'); btn.innerText = "Processing...";
            const img = document.getElementById('photo-preview');
            const net = await bodyPix.load();
            const segmentation = await net.segmentPerson(img);
            const canvasTmp = document.createElement('canvas');
            canvasTmp.width = img.width; canvasTmp.height = img.height;
            const ctxTmp = canvasTmp.getContext('2d');
            ctxTmp.drawImage(img, 0, 0);
            const imageData = ctxTmp.getImageData(0,0,canvasTmp.width,canvasTmp.height);
            for (let i = 0; i < imageData.data.length; i += 4) {
                if (segmentation.data[i / 4] === 0) imageData.data[i + 3] = 0;
            }
            ctxTmp.putImageData(imageData, 0, 0);
            img.src = canvasTmp.toDataURL(); btn.style.display = 'none';
        }

        // --- DRIVE SAVE LOGIC ---
        async function saveToDrive() {
            const data = {
                name: document.getElementById('p-name').value,
                photo: document.getElementById('photo-preview').src,
                sig: canvas.toDataURL(),
                summary: document.getElementById('p-summary').value,
                skills: document.getElementById('p-skills').value,
                exp: Array.from(document.querySelectorAll('.repeater')).map(r => ({
                    role: r.querySelector('.r-role').value,
                    desc: r.querySelector('.r-desc').value
                }))
            };
            const metadata = { name: 'proease_profile.json', parents: ['appDataFolder'] };
            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(metadata)], {type: 'application/json'}));
            form.append('file', new Blob([JSON.stringify(data)], {type: 'application/json'}));
            
            const url = fileId ? `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart` : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;
            await fetch(url, { method: fileId ? 'PATCH' : 'POST', headers: { Authorization: `Bearer ${driveToken}` }, body: form });
            alert("Saved to your Secure Google Drive!");
        }

        function addExp(d = {role:'', desc:''}) {
            const html = `<div class="repeater"><input type="text" class="r-role" placeholder="Role" value="${d.role}"><textarea class="r-desc" rows="3">${d.desc}</textarea></div>`;
            document.getElementById('exp-list').insertAdjacentHTML('beforeend', html);
        }

        window.onload = async () => {
            const res = await fetch('https://www.googleapis.com/drive/v3/files?spaces=appDataFolder', { headers: { Authorization: `Bearer ${driveToken}` } });
            const list = await res.json();
            const file = list.files.find(f => f.name === 'proease_profile.json');
            if(file) { fileId = file.id; /* Fetch & Populate code here */ } else { addExp(); }
        };
    </script>
</body>
</html>
