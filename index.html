<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Career Superapp</title>
    
    <!-- 1. Load Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <!-- 2. Load FingerprintJS v4 (Standard Browser Version) -->
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@4/dist/fp.min.js"></script>
    
    <script>
        // CONFIGURATION
        const CLIENT_ID = "883425754646-qdtov35q7ud513ed0ugame8042n46uof.apps.googleusercontent.com";
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz2jAFi51x6OYG-t8mND5oDJUQvAYiGoHNS6Ba8XrAJeSej8P7rOuWrgq-F8P_GvUue/exec";

        // This function handles the response from Google
        async function handleCredentialResponse(response) {
            const statusMsg = document.getElementById('statusMessage');
            statusMsg.innerText = "Security Check: Verifying Device...";
            statusMsg.style.color = "blue";

            try {
                // Wait for FingerprintJS to be ready
                if (typeof FingerprintJS === 'undefined') {
                    throw new Error("Security library not loaded. Please refresh or check your internet.");
                }

                // Initialize FingerprintJS
                const fpPromise = FingerprintJS.load();
                const fp = await fpPromise;
                const result = await fp.get();
                const deviceId = result.visitorId;

                // Decode Google Token
                const base64Url = response.credential.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const payload = JSON.parse(window.atob(base64));
                const userEmail = payload.email;

                statusMsg.innerText = "Syncing with Database...";

                // Send to Google Apps Script
                const apiResponse = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'login',
                        email: userEmail,
                        deviceId: deviceId
                    })
                });

                const apiResult = await apiResponse.json();

                if (apiResult.success) {
                    statusMsg.style.color = "green";
                    statusMsg.innerText = "Access Granted! Welcome " + apiResult.user.userId;
                    
                    // Save to session
                    localStorage.setItem('user', JSON.stringify(apiResult.user));
                    
                    // Optional: Redirect to dashboard after 1.5 seconds
                    // setTimeout(() => { window.location.href = "dashboard.html"; }, 1500);
                } else {
                    statusMsg.style.color = "red";
                    statusMsg.innerText = apiResult.message;
                }

            } catch (error) {
                statusMsg.style.color = "red";
                statusMsg.innerText = "Error: " + error.message;
                console.error(error);
            }
        }

        // Initialize Google Button when window loads
        window.onload = function () {
            google.accounts.id.initialize({
                client_id: CLIENT_ID,
                callback: handleCredentialResponse
            });
            google.accounts.id.renderButton(
                document.getElementById("googleBtn"),
                { theme: "outline", size: "large", width: "250" }
            );
        };
    </script>

    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f8f9fa; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; width: 320px; }
        h1 { font-size: 24px; color: #333; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; font-size: 14px; }
        #statusMessage { margin-top: 25px; font-size: 13px; font-weight: 500; min-height: 20px; }
        #googleBtn { display: flex; justify-content: center; }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>Career AI</h1>
        <p>Sign in to unlock your AI Resume & Interview tools</p>
        
        <div id="googleBtn"></div>

        <p id="statusMessage"></p>
    </div>

</body>
</html>
