<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Career Pro - Login</title>
    
    <!-- Scripts -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@4/dist/fp.min.js"></script>
    
    <script>
        // --- CONFIGURATION ---
        const CLIENT_ID = "883425754646-qdtov35q7ud513ed0ugame8042n46uof.apps.googleusercontent.com";
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyS6jfj_H3rRzsU_Bkc2RxyppUofIXtv4WXCh312cNAprmbjfUS_g-vDanbHCOnlpFJ/exec"; 

        async function handleCredentialResponse(response) {
            const statusMsg = document.getElementById('statusMessage');
            statusMsg.innerText = "Processing Security Check...";
            statusMsg.style.color = "blue";

            try {
                // 1. Get Fingerprint (Device ID)
                const fpPromise = FingerprintJS.load();
                const fp = await fpPromise;
                const result = await fp.get();
                const deviceId = result.visitorId;

                // 2. Decode Google Email
                const base64Url = response.credential.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const payload = JSON.parse(window.atob(base64));
                const userEmail = payload.email;

                statusMsg.innerText = "Connecting to Database...";

                // 3. Send to Backend
                const apiRes = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'login',
                        email: userEmail,
                        deviceId: deviceId
                    })
                });

                const apiResult = await apiRes.json();

                if (apiResult.success) {
                    statusMsg.style.color = "green";
                    statusMsg.innerText = "Success! Welcome " + apiResult.user.userId;
                    
                    // Save session
                    localStorage.setItem('user', JSON.stringify(apiResult.user));
                    
                    // Redirect to dashboard.html after 1.5 seconds
                    setTimeout(() => {
                        window.location.href = "dashboard.html";
                    }, 1500);
                } else {
                    statusMsg.style.color = "red";
                    statusMsg.innerText = apiResult.message;
                }

            } catch (error) {
                statusMsg.style.color = "red";
                statusMsg.innerText = "System Error: " + error.message;
                console.error(error);
            }
        }

        window.onload = function () {
            google.accounts.id.initialize({
                client_id: CLIENT_ID,
                callback: handleCredentialResponse
            });
            google.accounts.id.renderButton(
                document.getElementById("googleBtn"),
                { theme: "filled_blue", size: "large", width: "250", shape: "pill" }
            );
        };
    </script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f4f8; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; width: 340px; }
        h1 { margin: 0 0 10px 0; color: #2d3436; }
        p { color: #636e72; font-size: 14px; margin-bottom: 30px; }
        #googleBtn { display: flex; justify-content: center; }
        #statusMessage { margin-top: 25px; font-size: 13px; font-weight: bold; min-height: 20px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Career AI</h1>
        <p>Unlock your AI-powered career tools</p>
        <div id="googleBtn"></div>
        <p id="statusMessage"></p>
    </div>
</body>
</html>
