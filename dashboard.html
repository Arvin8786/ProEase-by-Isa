<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Career AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> <!-- We'll create this next -->
</head>
<body>
    <div class="main">
        <header>
            <div>
                <h2 id="pageTitle">Overview</h2>
                <span id="welcomeUser" style="color: #64748b">Welcome back</span>
            </div>
            <div class="user-badge">
                <span id="userHandle">...</span>
                <span class="tier-tag" id="tierTag">...</span>
            </div>
        </header>

        <div class="grid">
            <div class="card" onclick="location.href='resume-builder.html'">
                <h3>Resume Builder</h3>
                <p>Tailor your resume for any job.</p>
                <button class="action-btn">Launch</button>
            </div>
            <!-- Add more cards as needed -->
        </div>
    </div>

    <script src="sidebar.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        document.getElementById('userHandle').innerText = user.userId;
        document.getElementById('tierTag').innerText = user.status;
    </script>
</body>
</html>
